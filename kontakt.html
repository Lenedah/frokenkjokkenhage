<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt | Frøken Kjøkkenhage</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap");
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:"Lato",sans-serif;background:#fff;color:#111;font-weight:300;line-height:1.7}
    header{background:#007E9F;position:sticky;top:0;z-index:100}
    .nav-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:72px}
    .logo img{height:48px;width:auto}
    nav a{font-family:"Lato",sans-serif;font-weight:400;font-size:.8rem;color:#fff;text-decoration:none;margin-left:32px;letter-spacing:.06em;text-transform:uppercase}
    nav a:hover,nav a.aktiv{opacity:.75}
    .hamburger{display:none;flex-direction:column;cursor:pointer;gap:5px;background:none;border:none;padding:4px}
    .hamburger span{display:block;width:24px;height:2px;background:#fff}
    .mobil-meny{display:none;flex-direction:column;background:#007E9F;padding:8px 24px 16px}
    .mobil-meny a{font-size:.85rem;color:#fff;text-decoration:none;letter-spacing:.06em;text-transform:uppercase;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.2)}
    .mobil-meny a:last-child{border-bottom:none}
    .mobil-meny.åpen{display:flex}
    main{max-width:900px;margin:0 auto;padding:56px 24px 80px}
    h1{font-family:"Playfair Display",serif;font-size:2.6rem;font-weight:400;color:#007E9F;line-height:1.2;margin-bottom:16px}
    h3{font-family:"Lato",sans-serif;font-weight:700;font-size:.85rem;color:#111;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    p{margin-bottom:16px;font-size:1.05rem}
    a{color:#007E9F}
    .kontakt-info{margin:40px 0;display:grid;gap:32px;max-width:480px}
    .sosiale-lenker{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
    .sosial-knapp{display:inline-block;border:2px solid #007E9F;color:#007E9F!important;text-decoration:none;padding:10px 20px;font-size:.85rem;letter-spacing:.05em;text-transform:uppercase}
    .sosial-knapp:hover{background:#007E9F;color:#fff!important}
    footer{background:#007E9F;color:#fff;text-align:center;padding:40px 24px;font-size:.85rem}
    footer a{color:#fff;text-decoration:none;margin:0 8px}
    footer a:hover{text-decoration:underline}
    .footer-nav{margin-bottom:12px}
    @media(max-width:640px){h1{font-size:1.9rem}nav{display:none}.hamburger{display:flex}}
  </style>
</head>
<body>

<header>
  <div class="nav-inner">
    <a class="logo" href="index.html"><img src="bilder/logo.png" alt="Frøken Kjøkkenhage logo" /></a>
    <nav>
      <a href="om-meg.html">Om meg</a>
      <a href="arrangementer.html">Arrangementer</a>
      <a href="kontakt.html" class="aktiv">Kontakt</a>
    </nav>
    <button class="hamburger" onclick="toggleMeny()" aria-label="Meny"><span></span><span></span><span></span></button>
  </div>
  <div class="mobil-meny" id="mobilMeny">
    <a href="om-meg.html">Om meg</a>
    <a href="arrangementer.html">Arrangementer</a>
    <a href="kontakt.html">Kontakt</a>
  </div>
</header>

<main>
  <h1>Kontakt</h1>
  <p>Har du spørsmål, ønsker foredrag eller kurs, eller vil du samarbeide? Ta gjerne kontakt!</p>

  <div class="kontakt-info">
    <div>
      <h3>E-post</h3>
      <a href="mailto:frokenkjokkenhage@outlook.com" style="font-size:1.05rem">frokenkjokkenhage@outlook.com</a>
    </div>
    <div>
      <h3>Sosiale medier</h3>
      <div class="sosiale-lenker">
        <a class="sosial-knapp" href="https://www.instagram.com/frokenkjokkenhage/" target="_blank" rel="noopener">Instagram</a>
        <a class="sosial-knapp" href="https://www.facebook.com/p/Fr%C3%B8ken-Kj%C3%B8kkenhage-61556268093773/" target="_blank" rel="noopener">Facebook</a>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-nav">
    <a href="index.html">Forside</a>
    <a href="om-meg.html">Om meg</a>
    <a href="arrangementer.html">Arrangementer</a>
    <a href="kontakt.html">Kontakt</a>
  </div>
  <p>© 2026 – Frøken Kjøkkenhage</p>
</footer>

<script>function toggleMeny(){document.getElementById("mobilMeny").classList.toggle("åpen")}</script>
</body>
</html>
